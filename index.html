<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지식시장 평가 조회 시스템</title>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --secondary-color: #4a5568;
            --accent-color: #e53e3e;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', dotum, sans-serif; background-color: var(--bg-color); color: #2d3748; padding: 20px; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-color); margin-bottom: 10px; font-size: 24px; }
        .notice-banner { background-color: #fffaf0; border-left: 4px solid #dd6b20; padding: 12px; margin-bottom: 20px; border-radius: 4px; font-size: 0.95rem; color: #dd6b20; font-weight: bold; }
        .auth-box { border: 1px solid var(--border-color); padding: 20px; border-radius: 6px; margin-bottom: 25px; background: #edf2f7; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 1rem; }
        .btn { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn:hover { background: #2c5282; }
        .dashboard { display: none; margin-top: 20px; }
        .tab-menu { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #e2e8f0; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; text-align: center; }
        .tab-btn.active { background: var(--primary-color); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .class-section { border: 1px solid var(--border-color); padding: 15px; margin-bottom: 15px; border-radius: 6px; background: #fff; }
        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }
        th { background: #edf2f7; font-weight: bold; }
        .status-msg { text-align: center; color: #718096; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 지식시장 결과 조회 시스템</h1>
    
    <div class="notice-banner" id="authNoticeBanner">
        ⚠️ 로그인이 튕기거나 오류가 발생할 경우, 자신의 비밀번호 4자리를 다시 확인하여 정확하게 입력해 주세요.
    </div>

    <div class="auth-box" id="authBox">
        <div class="form-group">
            <label>반 선택</label>
            <select id="loginClass">
                <option value="">-- 선택하세요 --</option>
                <option value="1">1반</option>
                <option value="2">2반</option>
                <option value="3">3반</option>
                <option value="4">4반</option>
                <option value="5">5반</option>
                <option value="6">6반</option>
                <option value="7">7반</option>
            </select>
        </div>
        <div class="form-group">
            <label>이름 입력</label>
            <input type="text" id="loginName" placeholder="홍길동">
        </div>
        <div class="form-group">
            <label>비밀번호 (4자리)</label>
            <input type="password" id="loginPw" placeholder="숫자 4자리 입력">
        </div>
        <button class="btn" onclick="handleSystemLogin()">조회하기</button>
    </div>

    <div class="dashboard" id="mainDashboard">
        <h2 id="welcomeUser" style="margin-bottom: 15px; color: #2d3748;"></h2>
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchReportTab(0)">📢 판매자 리포트</button>
            <button class="tab-btn" onclick="switchReportTab(1)">🎒 구매자 리포트</button>
            <button class="tab-btn" onclick="switchReportTab(2)">🤝 동료 평가</button>
        </div>

        <div class="tab-content active" id="tabContentSeller">
            <div id="sellerViewContainer"></div>
        </div>
        <div class="tab-content" id="tabContentBuyer">
            <div id="buyerViewContainer"></div>
        </div>
        <div class="tab-content" id="tabContentTeam">
            <div id="teamViewContainer"></div>
        </div>
    </div>
</div>

<script>
    // 시스템 글로벌 상태 저장소 및 권한 정보
    var globalCloudDatabase = { accounts: [], perms: [], seller: [], buyer: [], team: [], self: [] };
    var currentSessionUser = null;
    var scoreMap = { "매우 잘함": 5, "잘함": 4, "보통": 3, "못함": 2, "매우 못함": 1, "매우 우수": 5, "우수": 4, "미흡": 2, "부족": 2 };
    
    // 스프레드시트 웹 앱 API 연결 Endpoint URL 주소 (기존 주소를 그대로 유지하여 기입해 주세요)
    var GOOGLE_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbxwUGraJnr3KF1Fpob9kR7y6e6nS_s10R9WO5ti5y1VrBz7VutZ9mNCbLboLomA9RzwbQ/exec"; 

    // 화면 로드 시 즉시 동기화 개시
    window.onload = function() {
        fetchRealtimeCloudDatabase();
    };

    function fetchRealtimeCloudDatabase() {
        if(GOOGLE_SCRIPT_API_URL.indexOf("여기에") === 0) {
            console.log("임시 데이터 바인딩 모드로 로드되었습니다.");
            return;
        }
        fetch(GOOGLE_SCRIPT_API_URL)
            .then(function(res){ return res.json(); })
            .then(function(data){
                if(data) {
                    globalCloudDatabase = data;
                    console.log("구글 시트 실시간 연동 완료");
                }
            }).catch(function(err){
                console.error("데이터 연동 실패:", err);
            });
    }

    // 시스템 로그인 처리 제어부
    function handleSystemLogin() {
        var inputClass = document.getElementById("loginClass").value;
        var inputName = document.getElementById("loginName").value.trim();
        var inputPw = document.getElementById("loginPw").value.trim();

        if(!inputClass || !inputName || !inputPw) {
            alert("모든 로그인 정보를 정확하게 입력해 주세요.");
            return;
        }

        // 실시간 로컬 DB 내 매칭 계정 탐색 (accounts.csv 매칭)
        var userRecord = globalCloudDatabase.accounts.find(function(row){
            return row[0].toString() === inputClass && 
                   row[2].toString().trim() === inputName && 
                   row[3].toString().trim() === inputPw;
        });

        if(!userRecord) {
            alert("일치하는 학생 정보가 없습니다. 반, 이름 혹은 비밀번호 4자리를 다시 확인해 주세요.");
            return;
        }

        currentSessionUser = { classNum: inputClass, name: inputName };
        document.getElementById("welcomeUser").innerText = "👋 안녕하세요, " + inputClass + "반 " + inputName + " 학생";
        document.getElementById("authBox").style.display = "none";
        document.getElementById("mainDashboard").style.display = "block";
        
        executeReportRendering();
    }

    // 탭 전환 핸들러
    function switchReportTab(index) {
        var tabs = document.querySelectorAll(".tab-btn");
        var contents = document.querySelectorAll(".tab-content");
        for(var i=0; i<tabs.length; i++) {
            tabs[i].classList.remove("active");
            contents[i].classList.remove("active");
        }
        tabs[index].classList.add("active");
        contents[index].classList.add("active");
    }

    // 반별 데이터 파싱 및 연산 핵심 엔진 (완벽 교정 버전)
    function compileAveragesByEvaluatorClass() {
        var rawScores = { seller: {}, buyer: {}, team: {} };

        // 1. 판매자 데이터 분석
        globalCloudDatabase.seller.forEach(function(r){
            if(!r || r.length < 5) return;
            var evaluatorText = r[2] ? r[2].toString() : ""; 
            var match = evaluatorText.match(/(\d+)반/);
            var evalClass = match ? parseInt(match[1]) : (r[1] ? parseInt(r[1]) : NaN);

            var targetName = r[3] ? r[3].toString().trim() : ""; 
            var scoreStr = r[4] ? r[4].toString().trim() : ""; 
            if(isNaN(evalClass) || !targetName || !scoreMap[scoreStr]) return;

            var key = evalClass + "_" + targetName;
            if(!rawScores.seller[key]) rawScores.seller[key] = [];
            rawScores.seller[key].push(scoreMap[scoreStr]);
        });

        // 2. 구매자 데이터 분석 (1학년 X반 형태 완벽 해독 및 매칭)
        globalCloudDatabase.buyer.forEach(function(r){
            if(!r || r.length < 4) return;
            var evaluatorText = r[1] ? r[1].toString() : ""; 
            var match = evaluatorText.match(/(\d+)반/);
            var evalClass = match ? parseInt(match[1]) : NaN;

            var targetName = r[2] ? r[2].toString().trim() : ""; 
            var scoreStr = r[3] ? r[3].toString().trim() : ""; 
            if(isNaN(evalClass) || !targetName || !scoreMap[scoreStr]) return;

            var key = evalClass + "_" + targetName;
            if(!rawScores.buyer[key]) rawScores.buyer[key] = [];
            rawScores.buyer[key].push(scoreMap[scoreStr]);
        });

        // 3. 동료 평가 데이터 분석
        globalCloudDatabase.team.forEach(function(r){
            if(!r || r.length < 4) return;
            var evaluatorText = r[1] ? r[1].toString() : ""; 
            var match = evaluatorText.match(/(\d+)반/);
            var evalClass = match ? parseInt(match[1]) : (r[0] ? parseInt(r[0]) : NaN);

            var targetName = r[2] ? r[2].toString().trim() : ""; 
            var scoreStr = r[3] ? r[3].toString().trim() : ""; 
            if(isNaN(evalClass) || !targetName || !scoreMap[scoreStr]) return;

            var key = evalClass + "_" + targetName;
            if(!rawScores.team[key]) rawScores.team[key] = [];
            rawScores.team[key].push(scoreMap[scoreStr]);
        });

        var finalStats = { seller: {}, buyer: {}, team: {} };
        ['seller', 'buyer', 'team'].forEach(function(mode){
            Object.keys(rawScores[mode]).forEach(function(key){
                var arr = rawScores[mode][key];
                var sum = arr.reduce(function(a,b){return a+b;}, 0);
                finalStats[mode][key] = {
                    avg: (sum / arr.length).toFixed(2),
                    count: arr.length
                };
            });
        });
        return finalStats;
    }

    // 리포트 렌더링 총괄 제어부
    function executeReportRendering() {
        var calculatedStats = compileAveragesByEvaluatorClass();
        var currentClass = currentSessionUser.classNum;

        // 1. 판매자 탭 렌더링
        renderIsolatedReportView("sellerViewContainer", globalCloudDatabase.seller, currentClass, 1, calculatedStats.seller);
        // 2. 구매자 탭 렌더링 (보정된 통계치 적용)
        renderIsolatedReportView("buyerViewContainer", globalCloudDatabase.buyer, currentClass, 2, calculatedStats.buyer);
        // 3. 동료 평가 탭 렌더링
        renderIsolatedReportView("teamViewContainer", globalCloudDatabase.team, currentClass, 3, calculatedStats.team);
    }

    // 단독 리포트 뷰 렌더링 빌더 함수 (v38 기반 완벽 복구본)
    function renderIsolatedReportView(viewId, records, classNum, mode, modeStatObj) {
        var container = document.getElementById(viewId);
        container.innerHTML = '';
        
        var studentGroups = {};
        for(var i=0; i<records.length; i++) {
            var r = records[i]; if(!r || r.length < 3) continue;
            
            var evaluatorText = (mode === 3) ? (r[1] || "") : (r[1] || "");
            // 판매자 데이터의 경우 인덱스 2가 evaluator
            if(mode === 1) evaluatorText = r[2] || "";

            var match = evaluatorText.toString().match(/(\d+)반/);
            var evalClass = match ? parseInt(match[1]) : (mode === 3 ? parseInt(r[0]) : NaN);
            
            if(isNaN(evalClass) || evalClass !== parseInt(classNum)) continue; 

            var targetName = (mode === 1) ? (r[3] ? r[3].toString().trim() : "") : (r[2] ? r[2].toString().trim() : ""); 
            if(!targetName) continue;

            if(!studentGroups[targetName]) studentGroups[targetName] = [];
            studentGroups[targetName].push(r);
        }

        var hasData = false;
        for(var targetName in studentGroups) {
            hasData = true;
            var list = studentGroups[targetName];
            
            var sKey = classNum + "_" + targetName;
            var stat = modeStatObj[sKey];
            var summaryText = "⚠️ 해당 반 친구들이 평가한 기록이 존재하지 않거나 연산 대기 중입니다.";
            if(stat) {
                summaryText = "⭐ 오직 " + classNum + "반 학생들이 평정한 5점 만점 환산 평균: [ " + stat.avg + " 점 ] / 유효 평가 참여수: " + stat.count + "회";
            }

            var html = '<div class="class-section" style="border-left: 5px solid var(--secondary-color); margin-bottom: 15px; padding-left: 10px;">' +
                       '<p style="font-weight:bold; margin-bottom:4px; color:#2c5282;">🎯 피평가 대상자 학생: [ ' + targetName + ' ]</p>' +
                       '<p style="font-size:0.85rem; color:#4a5568; font-weight:bold; margin-bottom:8px; background:#edf2f7; padding:6px; border-radius:4px;">' + summaryText + '</p>' +
                       '<div class="table-wrapper"><table style="width:100%; border-collapse:collapse;"><tbody>';

            for(var k=0; k<list.length; k++) {
                var item = list[k]; html += '<tr style="border-bottom: 1px solid #e2e8f0;">';
                if(mode === 1) {
                    html += '<td style="padding:6px; width:20%;">' + item[0] + '</td>' +
                            '<td style="padding:6px; width:40%;">평가자: ' + item[2] + '</td>' +
                            '<td style="padding:6px; font-weight:bold; color:#2b6cb0;">평정 점수: ' + item[4] + '</td>';
                } else if(mode === 2) {
                    html += '<td style="padding:6px; width:25%;">동작 부스: ' + item[0] + '</td>' +
                            '<td style="padding:6px; width:35%;">평가자(구매자): ' + item[1] + '</td>' +
                            '<td style="padding:6px; font-weight:bold; color:purple;">내용 평정: ' + item[3] + '</td>';
                } else if(mode === 3) {
                    html += '<td style="padding:6px; width:30%;">평가자(조원): ' + item[1] + '</td>' +
                            '<td style="padding:6px; font-weight:bold; color:blue; width:20%;">기여도: ' + item[3] + '</td>' +
                            '<td style="padding:6px; text-align:left; background:#fffaf0;">✍️ 사유: ' + item[4] + '</td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table></div></div>';
            container.innerHTML += html;
        }

        if(!hasData) {
            container.innerHTML = '<p class="status-msg">해당 반 학생들이 작성한 평가 데이터가 아직 존재하지 않습니다.</p>';
        }
    }
</script>

</body>
</html>
